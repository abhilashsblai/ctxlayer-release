<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">CTX Layer performance snapshot</title>
  <desc id="desc">A visual benchmark snapshot showing large workspace startup and memory recall improvements in CTX Layer preview releases.</desc>
  <rect width="1280" height="520" fill="#ffffff"/>
  <text x="80" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="850" fill="#0f172a">Performance Snapshot</text>
  <text x="80" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Large workspace DB release-gate measurements, summarized for quick scanning.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="80" y="170" width="1120" height="112" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="120" y="216" font-size="26" font-weight="800" fill="#0f172a">Service startup</text>
    <rect x="390" y="205" width="580" height="30" rx="15" fill="#fecaca"/>
    <rect x="390" y="205" width="44" height="30" rx="15" fill="#22c55e"/>
    <text x="990" y="228" font-size="22" font-weight="800" fill="#991b1b">6900-7000 ms</text>
    <text x="450" y="228" font-size="20" font-weight="800" fill="#166534">low single-digit ms</text>

    <rect x="80" y="320" width="1120" height="112" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="120" y="366" font-size="26" font-weight="800" fill="#0f172a">Memory recall</text>
    <rect x="390" y="355" width="520" height="30" rx="15" fill="#fed7aa"/>
    <rect x="390" y="355" width="84" height="30" rx="15" fill="#22c55e"/>
    <text x="930" y="378" font-size="22" font-weight="800" fill="#9a3412">273-314 ms</text>
    <text x="492" y="378" font-size="20" font-weight="800" fill="#166534">low tens of ms</text>
  </g>

  <text x="80" y="478" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">See docs/releases/v0.2.0a11.md for release scope, caveats, and exact context.</text>
</svg>
