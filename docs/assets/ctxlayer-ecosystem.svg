<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">CTX Layer ecosystem positioning</title>
  <desc id="desc">Codex, Claude Code, Cursor, Gemini CLI, and MCP clients connect through CTX Layer to a governed local repository workflow.</desc>
  <defs>
    <linearGradient id="ctx" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="620" fill="#f8fafc"/>
  <text x="640" y="72" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">Where CTX Layer Fits</text>
  <text x="640" y="112" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Agents write code. CTX Layer supplies repository cognition.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">
    <rect x="100" y="170" width="210" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <text x="205" y="221" text-anchor="middle">Codex</text>
    <rect x="390" y="150" width="210" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <text x="495" y="201" text-anchor="middle">Claude Code</text>
    <rect x="680" y="150" width="210" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <text x="785" y="201" text-anchor="middle">Cursor</text>
    <rect x="970" y="170" width="210" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <text x="1075" y="221" text-anchor="middle">Gemini CLI</text>
  </g>

  <g stroke="#64748b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M205 252 C280 315, 395 330, 505 344"/>
    <path d="M495 232 C520 282, 560 315, 610 344"/>
    <path d="M785 232 C760 282, 720 315, 670 344"/>
    <path d="M1075 252 C1000 315, 885 330, 775 344"/>
  </g>

  <rect x="410" y="330" width="460" height="132" rx="28" fill="url(#ctx)" filter="url(#shadow)"/>
  <text x="640" y="386" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff">CTX Layer</text>
  <text x="640" y="425" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" fill="#dbeafe">Repository memory, context packs, workflow, governance, impact, learning</text>

  <g stroke="#64748b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M640 462 V512"/>
  </g>
  <rect x="330" y="512" width="620" height="72" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="640" y="557" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Local Repository + SQLite Workspace + MCP Server + AGENTS.md</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">
    <rect x="120" y="378" width="180" height="58" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="210" y="414" text-anchor="middle">AI coding</text>
    <rect x="980" y="378" width="180" height="58" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="1070" y="414" text-anchor="middle">Agent workflow</text>
  </g>
</svg>
